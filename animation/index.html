<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YuAIlo — LP Animation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&family=Oswald:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; background: #070910; overflow: hidden; }
#root { position: absolute; inset: 0; }
</style>
</head>
<body>
<div id="root"></div>

<!-- Claude Design Runtime Shim -->
<script>
// ── clamp / animate / Easing ─────────────────────────────────────
window.clamp = (v, min, max) => Math.min(Math.max(v, min), max);

window.Easing = {
  linear: t => t,
  easeOutCubic:   t => 1 - Math.pow(1 - t, 3),
  easeInOutCubic: t => t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2, 3)/2,
  easeOutBack:    t => { const c1=1.70158, c3=c1+1; return 1+c3*Math.pow(t-1,3)+c1*Math.pow(t-1,2); },
  easeOutQuart:   t => 1 - Math.pow(1-t,4),
  easeOutExpo:    t => t===1 ? 1 : 1-Math.pow(2,-10*t),
};

window.animate = ({ from, to, start, end, ease = window.Easing.linear }) => {
  return (t) => {
    const p = window.clamp((t - start) / Math.max(end - start, 0.001), 0, 1);
    return from + (to - from) * ease(p);
  };
};

// ── Time context ─────────────────────────────────────────────────
window.__TimeContext = null; // set after React loads

// ── Stage / Sprite / useTime ─────────────────────────────────────
// These will be defined inside the Babel script below so React is available.
</script>

<script type="text/babel">
// Make React helpers available globally for the main animation script
const { useContext, useEffect, useRef, useState, useMemo, createContext } = React;

const TimeContext = createContext(0);
window.__TimeContext = TimeContext;

window.useTime = () => useContext(TimeContext);

window.Stage = function Stage({ children, width, height, duration = 60, background = '#070910', ...props }) {
  const [time, setTime] = useState(0);
  const startRef = useRef(null);
  const rafRef = useRef(null);

  useEffect(() => {
    startRef.current = performance.now();
    const tick = (now) => {
      const elapsed = (now - startRef.current) / 1000;
      setTime(elapsed % duration);
      rafRef.current = requestAnimationFrame(tick);
    };
    rafRef.current = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(rafRef.current);
  }, [duration]);

  return (
    <TimeContext.Provider value={time}>
      <div style={{
        position: 'relative',
        width: '100%', height: '100%',
        background,
        overflow: 'hidden',
      }} {...props}>
        {children}
      </div>
    </TimeContext.Provider>
  );
};

window.Sprite = function Sprite({ children, start = 0, end = Infinity }) {
  const t = useContext(TimeContext);
  if (t < start || t > end + 0.1) return null;
  return <>{children}</>;
};

window.TimestampLabel = function TimestampLabel() {
  const t = useContext(TimeContext);
  const sec = Math.floor(t);
  useEffect(() => {
    const el = document.querySelector('[data-screen-label]');
    if (el) el.setAttribute('data-screen-label', `t=${sec}s`);
  });
  return null;
};
</script>

<script type="text/babel" src="animations.jsx"></script>
</body>
</html>
